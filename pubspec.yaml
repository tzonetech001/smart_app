name: smart_business_analytics
description: Smart Business Research and Sales Analytics with AI Assistance
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Updated to latest compatible versions
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  
  # UI
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  fl_chart: ^0.69.2
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.3.0
  
  # Image Picker
  image_picker: ^1.1.2
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true