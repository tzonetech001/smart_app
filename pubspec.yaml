name: smart_business_analytics
description: Smart Business Research and Sales Analytics with AI Assistance
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Use compatible versions
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  
  # UI
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.0
  carousel_slider: ^4.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.0
  
  # Image Picker
  image_picker: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true